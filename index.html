<!DOCTYPE html>
<html>
<head>
    <title>Job Application Form</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f9; margin: 20px; }
        h1 { text-align: center; color: #333; }
        form { background: #fff; padding: 20px; max-width: 700px; margin: auto; transition: transform 0.2s; }
        table { width: 100%; margin-bottom: 20px; }
        td { padding: 8px; }
        input, select, textarea { width: 95%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Focus & Blur Styles */
        input:focus, textarea:focus { border-color: #4CAF50; outline: none; background-color: #f0fff0; }
        
        input[type="radio"], input[type="checkbox"] { width: auto; }
        input[type="submit"] { background: #4CAF50; color: white; border: none; border-radius: 4px; padding: 12px 20px; cursor: pointer; width: 100%; font-size: 16px; }
        input[type="submit"]:hover { background: #45a049; }
        
        .error { color: red; font-size: 14px; margin-top: 5px; }
        .success { color: green; font-size: 16px; text-align: center; margin-top: 20px; }
        
        /* Shake Animation */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        .shake-effect { animation: shake 0.3s ease-in-out; border: 2px solid red !important; }

        #details { margin: 20px auto; max-width: 700px; background: #e8f5e9; padding: 15px; border: 1px solid #c8e6c9; display: none; }
        li { padding: 5px 0; border-bottom: 1px solid #d0d0d0; list-style: none; }
    </style>
</head>

<body>
    <h1>Job Application Form</h1>

    <form id="jobForm">
        <p style="font-size: 20px">1. Personal Information</p>  
        <table>
            <tr>
                <td><label for="fullname">Full Name:</label></td>
                <td><input type="text" name="fullname" id="fullname" required minlength="5" placeholder="Enter full name"></td>
            </tr>
            <tr>
                <td><label>Gender:</label></td>
                <td>
                    <input type="radio" name="gender" value="Male" required> Male
                    <input type="radio" name="gender" value="Female"> Female
                    <input type="radio" name="gender" value="Other"> Other
                </td>
            </tr>
            <tr>
                <td><label for="dob">Date of Birth:</label></td>
                <td><input type="date" name="dob" id="dob" required></td>
            </tr>
        </table>

        <p style="font-size: 20px;">2. Contact Information</p>
        <table>
            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" name="email" id="email" required></td>
            </tr>
            <tr>
                <td><label for="phone">Phone Number:</label></td>
                <td><input type="tel" name="phone" id="phone" required></td>
            </tr>
        </table>

        <p style="font-size: 20px;">3. Job Information</p>
        <table>
            <tr>
                <td><label for="position">Position Applied For:</label></td>
                <td>
                    <select name="position" id="position" required>
                        <option value="">Select Position</option>
                        <option value="Web Developer">Web Developer</option>
                        <option value="Designer">Designer</option>
                        <option value="Manager">Manager</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="salary">Expected Salary:</label></td>
                <td><input type="number" name="salary" id="salary" min="30000" max="150000" required></td>
            </tr>
        </table>

        <p style="font-size: 20px;">4. Experience Information</p>
        <table>
            <tr>
                <td><label for="resume">Upload Resume:</label></td>
                <td><input type="file" name="resume" id="resume" required></td>
            </tr>
            <tr>
                <td><label for="experience">Years of Experience:</label></td>
                <td><input type="number" name="experience" id="experience" min="0" max="50" required></td>
            </tr>
        </table>

        <p style="font-size: 20px;">5. Skills and Qualifications</p>
        <table>
            <tr>
                <td><label for="skills">Skills:</label></td>
                <td><textarea name="skills" id="skills" required rows="4"></textarea></td>
            </tr>
            <tr>
                <td><label for="languages">Languages:
                    <br>
                    <small>(Press Ctrl to select multiple)</small>
                </label></td>
                <td>
                    <select name="languages" id="languages" multiple required>
                        <option value="English">English</option>
                        <option value="Spanish">Spanish</option>
                        <option value="French">French</option>
                        <option value="Hindi">Hindi</option>
                        <option value = "German">German</option>
                        <option value = "Sanskrit">Sanskrit</option>
                    </select>
                </td>
            </tr>
        </table>

        <p style="font-size: 20px;">6. Agreement</p>
        <table>
            <tr>
                <td><label for="terms">I agree to the terms:</label></td>
                <td><input type="checkbox" name="terms" id="terms" required></td>
            </tr>
        </table>

        <p style="font-size: 20px;">7. Security</p>
        <table>
            <tr>
                <td><label for="password">Password:</label></td>
                <td><input type="password" name="password" id="password" required></td>
            </tr>
            <tr>
                <td><label for="confirm_password">Confirm Password:</label></td>
                <td><input type="password" name="confirm_password" id="confirm_password" required></td>
            </tr>
        </table>

        <p style="font-size: 20px;">8. Submission</p>
        <table>
            <tr>
                <td><label for="submit">Submit Application:</label></td>
                <td><input type="submit" id="submitBtn" value="Submit"></td>
            </tr>
        </table>
    </form>

    <div id="confirmation" class="success"></div>
    <div id="details"></div>

    <script>
        const form = document.getElementById("jobForm");
        const fullNameInput = document.getElementById("fullname");

        // 1. FOCUS & BLUR Events
        fullNameInput.addEventListener("focus", function() {
            console.log("Full Name field focused");
        });

        fullNameInput.addEventListener("blur", function() {
            if (this.value.length < 5) {
                // 2. SHAKE Effect (via class)
                this.classList.add("shake-effect");
                setTimeout(() => this.classList.remove("shake-effect"), 300);
            }
        });

        // 3. INPUT Event (Real-time tracking)
        fullNameInput.addEventListener("input", function() {
            console.log("Current value: " + this.value);
        });

        // 4. CLICK Event
        document.getElementById("submitBtn").addEventListener("click", function() {
            console.log("Submit button clicked");
        });

        // 5. SUBMIT Event
        form.addEventListener("submit", function(event) {
            event.preventDefault();

            const dob = document.querySelector('input[name="dob"]').value;
            const password = document.querySelector('input[name="password"]').value;
            const confirmPassword = document.querySelector('input[name="confirm_password"]').value;
            const detailsBox = document.getElementById("details");
            const confirmation = document.getElementById("confirmation");

            document.querySelectorAll(".error").forEach(el => el.remove());
            let valid = true;

            // Simple Age Validation
            if (new Date().getFullYear() - new Date(dob).getFullYear() < 18) {
                showError('dob', "Must be 18+");
                valid = false;
            }

            // Password Validation
            if (password !== confirmPassword) {
                showError('confirm_password', "Passwords do not match.");
                valid = false;
            }

            if (valid) {
                // 6. ALERT Event
                alert("Form verified successfully!");
                
                confirmation.innerHTML = "Application Submitted!";
                detailsBox.style.display = "block";
                detailsBox.innerHTML = "<h3>Review your info above.</h3>";
                this.reset();
            } else {
                // Shake the whole form if there are errors
                form.classList.add("shake-effect");
                setTimeout(() => form.classList.remove("shake-effect"), 300);
            }
        });

        function showError(fieldName, message) {
            let field = document.querySelector('[name="' + fieldName + '"]');
            let error = document.createElement("div");
            error.className = "error";
            error.innerText = message;
            field.parentNode.appendChild(error);
        }
    </script>
</body>
</html>
